<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="dinoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bgGrad)"/>

  <!-- Grid lines for cyber feel -->
  <line x1="0" y1="160" x2="400" y2="160" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <line x1="0" y1="170" x2="400" y2="170" stroke="#4ade80" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#4ade80" stroke-width="0.5" opacity="0.1"/>

  <!-- Ground glow -->
  <rect x="0" y="160" width="400" height="40" fill="url(#groundGrad)" opacity="0.5"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1.5" fill="#a855f7" opacity="0.8"/>
  <circle cx="90" cy="15" r="1" fill="#22d3ee" opacity="0.6"/>
  <circle cx="160" cy="30" r="1.5" fill="#4ade80" opacity="0.7"/>
  <circle cx="350" cy="20" r="2" fill="#a855f7" opacity="0.6"/>
  <circle cx="290" cy="35" r="1" fill="#22d3ee" opacity="0.5"/>

  <!-- Cactus 1 -->
  <rect x="300" y="115" width="12" height="45" fill="#22c55e" rx="3" opacity="0.9"/>
  <rect x="292" y="128" width="6" height="3" fill="#22c55e" rx="1" opacity="0.9"/>
  <rect x="289" y="123" width="3" height="10" fill="#22c55e" rx="1" opacity="0.9"/>
  <rect x="312" y="133" width="6" height="3" fill="#22c55e" rx="1" opacity="0.9"/>
  <rect x="315" y="128" width="3" height="8" fill="#22c55e" rx="1" opacity="0.9"/>

  <!-- Cactus 2 (smaller) -->
  <rect x="350" y="130" width="8" height="30" fill="#22c55e" rx="2" opacity="0.7"/>
  <rect x="344" y="138" width="5" height="2" fill="#22c55e" rx="1" opacity="0.7"/>
  <rect x="342" y="135" width="2" height="6" fill="#22c55e" rx="1" opacity="0.7"/>

  <!-- Dino body -->
  <rect x="80" y="100" width="50" height="45" fill="url(#dinoGrad)" rx="6"/>

  <!-- Dino head -->
  <rect x="122" y="78" width="35" height="32" fill="url(#dinoGrad)" rx="8"/>

  <!-- Dino eye -->
  <circle cx="143" cy="90" r="5" fill="white"/>
  <circle cx="145" cy="90" r="2.5" fill="#0f172a"/>

  <!-- Dino mouth (open, running!) -->
  <rect x="150" y="100" width="12" height="4" fill="#0f172a" rx="1"/>

  <!-- Dino legs (running) -->
  <rect x="90" y="142" width="8" height="18" fill="url(#dinoGrad)" rx="2" transform="rotate(-15 94 142)"/>
  <rect x="112" y="142" width="8" height="18" fill="url(#dinoGrad)" rx="2" transform="rotate(10 116 142)"/>

  <!-- Dino tail -->
  <polygon points="80,118 58,105 62,128" fill="url(#dinoGrad)"/>

  <!-- Dino arm -->
  <rect x="105" y="115" width="15" height="5" fill="url(#dinoGrad)" rx="2"/>

  <!-- Speed lines -->
  <line x1="30" y1="110" x2="65" y2="110" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="120" x2="60" y2="120" stroke="#4ade80" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="130" x2="70" y2="130" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
  <line x1="25" y1="140" x2="55" y2="140" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>

  <!-- Title -->
  <text x="200" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4ade80" letter-spacing="3">CKB DINO RUN</text>
  <text x="200" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a855f7" letter-spacing="1">SURVIVE • EARN • WIN</text>

  <!-- Reward chips -->
  <rect x="15" y="175" width="90" height="18" fill="#4ade80" opacity="0.15" rx="9"/>
  <text x="60" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80" font-weight="bold">🏆 200 CKB</text>

  <rect x="295" y="175" width="90" height="18" fill="#a855f7" opacity="0.15" rx="9"/>
  <text x="340" y="187" text-anchor="middle" font-family="monospace" font-size="10" fill="#a855f7" font-weight="bold">💎 1000 CKB</text>

  <!-- Glow effect under dino -->
  <ellipse cx="110" cy="160" rx="35" ry="4" fill="#4ade80" opacity="0.25"/>
</svg>
